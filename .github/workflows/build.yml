name: Build PLatex

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --onedir --noconsole --contents-directory . --name platex-client --icon assets/platex-client.ico --paths src --add-data "scripts/glm_vision_ocr.py;scripts" --add-data "scripts/hotkey_click.py;scripts" --hidden-import pynput.keyboard --hidden-import pynput.mouse --hidden-import pynput._util --collect-submodules PyQt6 --collect-data PyQt6 --collect-binaries PyQt6 launcher.py

      - name: Verify bundled runtime files
        run: |
          if (!(Test-Path "dist/platex-client/platex-client.exe")) { throw "Missing dist/platex-client/platex-client.exe" }
          foreach ($script in @("glm_vision_ocr.py", "hotkey_click.py")) {
            $scriptPath = "dist/platex-client/scripts/$script"
            if (!(Test-Path $scriptPath)) {
              $fallbackScriptPath = "dist/platex-client/_internal/scripts/$script"
              if (!(Test-Path $fallbackScriptPath)) { throw "Missing bundled script file: $script" }
            }
          }

      - name: Build Inno Setup installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" platex-client.iss'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platex-client-windows-build
          path: |
            dist/installer/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
          generate_release_notes: true