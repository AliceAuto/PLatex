name: Build PLatex

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --name platex-client --paths src --add-data "scripts/glm_vision_ocr.py;scripts" launcher.py --clean

      - name: Build Inno Setup installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" platex-client.iss'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platex-client-windows-build
          path: |
            dist/installer/*.exe
