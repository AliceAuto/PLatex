name: Build PLatex

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --onedir --contents-directory . --name platex-client --paths src --add-data "scripts/glm_vision_ocr.py;scripts" --collect-submodules PyQt6 --collect-data PyQt6 --collect-binaries PyQt6 launcher.py

      - name: Verify bundled runtime files
        run: |
          if (!(Test-Path "dist/platex-client/platex-client.exe")) { throw "Missing dist/platex-client/platex-client.exe" }
          $scriptPath = "dist/platex-client/scripts/glm_vision_ocr.py"
          if (!(Test-Path $scriptPath)) {
            $fallbackScriptPath = "dist/platex-client/_internal/scripts/glm_vision_ocr.py"
            if (!(Test-Path $fallbackScriptPath)) { throw "Missing bundled script file" }
          }

      - name: Build Inno Setup installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" platex-client.iss'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platex-client-windows-build
          path: |
            dist/installer/*.exe
