name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  INNO_SETUP_VERSION: "6.4.2"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from platex_client import __version__; print(__version__)"
          if ($LASTEXITCODE -ne 0) { throw "Failed to extract version" }
          $version = $version.Trim()
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version: $version"

      - name: Install Inno Setup
        run: |
          choco install innosetup --version="${env:INNO_SETUP_VERSION}" -y --no-progress

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean platex-client.spec

      - name: Verify build output
        shell: pwsh
        run: |
          $exePath = "dist/platex-client/platex-client.exe"
          if (!(Test-Path $exePath)) { throw "Missing $exePath" }
          Write-Host "OK: platex-client.exe found"

          foreach ($script in @("glm_vision_ocr.py", "hotkey_click.py")) {
            $found = $false
            foreach ($base in @("dist/platex-client", "dist/platex-client/_internal")) {
              $candidate = Join-Path $base "scripts/$script"
              if (Test-Path $candidate) {
                Write-Host "OK: $script found at $candidate"
                $found = $true
                break
              }
            }
            if (!$found) { throw "Missing bundled script: $script" }
          }

          foreach ($locale in @("en.yaml", "zh-cn.yaml")) {
            $found = $false
            foreach ($base in @("dist/platex-client", "dist/platex-client/_internal")) {
              $candidate = Join-Path $base "platex_client/locales/$locale"
              if (Test-Path $candidate) {
                Write-Host "OK: locale $locale found at $candidate"
                $found = $true
                break
              }
            }
            if (!$found) { throw "Missing bundled locale: $locale" }
          }

          foreach ($asset in @("platex-client.png", "platex-client.ico")) {
            $found = $false
            foreach ($base in @("dist/platex-client", "dist/platex-client/_internal")) {
              $candidate = Join-Path $base "assets/$asset"
              if (Test-Path $candidate) {
                Write-Host "OK: asset $asset found at $candidate"
                $found = $true
                break
              }
            }
            if (!$found) { throw "Missing bundled asset: $asset" }
          }

          $pyQt6Dir = "dist/platex-client/_internal/PyQt6"
          if (!(Test-Path $pyQt6Dir)) {
            $pyQt6Dir = "dist/platex-client/PyQt6"
            if (!(Test-Path $pyQt6Dir)) {
              Write-Host "WARNING: PyQt6 directory not found in expected locations"
            }
          }
          if (Test-Path $pyQt6Dir) { Write-Host "OK: PyQt6 found at $pyQt6Dir" }

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = $null
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "${env:LOCALAPPDATA}\Programs\Inno Setup 6\ISCC.exe"
          )
          foreach ($path in $candidates) {
            if (Test-Path $path) {
              $iscc = $path
              Write-Host "Found ISCC: $path"
              break
            }
          }
          if (!$iscc) { throw "ISCC.exe not found in any expected location" }
          & $iscc /DMyAppVersion="${{ steps.version.outputs.app_version }}" platex-client.iss

      - name: Verify installer
        shell: pwsh
        run: |
          $installerPattern = "dist/installer/PLatexClient-*-win64-setup.exe"
          $installers = Get-ChildItem -Path $installerPattern
          if ($installers.Count -eq 0) { throw "No installer found matching $installerPattern" }
          foreach ($inst in $installers) {
            Write-Host "OK: Installer found - $($inst.Name) ($([math]::Round($inst.Length / 1MB, 2)) MB)"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platex-client-windows-build
          path: dist/installer/*.exe

      - name: Determine release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "prerelease=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            git fetch --tags origin
            $tags = git tag -l "v*"
            $versions = @()
            foreach ($tag in $tags) {
              if ($tag -match '^v(\d+\.\d+\.\d+)$') {
                try { $versions += [version]$Matches[1] } catch {}
              }
            }
            if ($versions.Count -eq 0) {
              $next = [version]'1.0.0'
            } else {
              $current = $versions | Sort-Object -Descending | Select-Object -First 1
              $next = [version]::new($current.Major, $current.Minor, $current.Build + 1)
            }
            "tag_name=v$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "prerelease=${{ inputs.prerelease }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.tag_name }}
          generate_release_notes: true
          files: dist/installer/*.exe
          prerelease: ${{ steps.release.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglib2.0-0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxkbcommon-x11-0 \
            wget

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Extract version
        id: version
        run: |
          version=$(python -c "from platex_client import __version__; print(__version__)")
          if [ $? -ne 0 ]; then echo "Failed to extract version"; exit 1; fi
          version=$(echo "$version" | xargs)
          echo "app_version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --clean platex-client.spec

      - name: Verify build output
        run: |
          exe_path="dist/platex-client/platex-client"
          if [ ! -f "$exe_path" ]; then echo "Missing $exe_path"; exit 1; fi
          echo "OK: platex-client found"

          for script in glm_vision_ocr.py hotkey_click.py; do
            found=false
            for base in dist/platex-client dist/platex-client/_internal; do
              candidate="$base/scripts/$script"
              if [ -f "$candidate" ]; then
                echo "OK: $script found at $candidate"
                found=true
                break
              fi
            done
            if [ "$found" = false ]; then echo "Missing bundled script: $script"; exit 1; fi
          done

          for locale in en.yaml zh-cn.yaml; do
            found=false
            for base in dist/platex-client dist/platex-client/_internal; do
              candidate="$base/platex_client/locales/$locale"
              if [ -f "$candidate" ]; then
                echo "OK: locale $locale found at $candidate"
                found=true
                break
              fi
            done
            if [ "$found" = false ]; then echo "Missing bundled locale: $locale"; exit 1; fi
          done

          for asset in platex-client.png platex-client.ico; do
            found=false
            for base in dist/platex-client dist/platex-client/_internal; do
              candidate="$base/assets/$asset"
              if [ -f "$candidate" ]; then
                echo "OK: asset $asset found at $candidate"
                found=true
                break
              fi
            done
            if [ "$found" = false ]; then echo "Missing bundled asset: $asset"; exit 1; fi
          done

          pyQt6Dir="dist/platex-client/_internal/PyQt6"
          if [ ! -d "$pyQt6Dir" ]; then
            pyQt6Dir="dist/platex-client/PyQt6"
            if [ ! -d "$pyQt6Dir" ]; then
              echo "WARNING: PyQt6 directory not found in expected locations"
            fi
          fi
          if [ -d "$pyQt6Dir" ]; then echo "OK: PyQt6 found at $pyQt6Dir"; fi

      - name: Build AppImage
        run: |
          python build_linux.py --skip-pyinstaller --version "${{ steps.version.outputs.app_version }}"

      - name: Verify AppImage
        run: |
          appimage_pattern="dist/installer/PLatexClient-*-x86_64.AppImage"
          installers=(dist/installer/PLatexClient-*-x86_64.AppImage)
          if [ ${#installers[@]} -eq 0 ] || [ ! -f "${installers[0]}" ]; then
            echo "No AppImage found matching $appimage_pattern"
            exit 1
          fi
          for inst in "${installers[@]}"; do
            size_mb=$(echo "scale=2; $(stat -c%s "$inst") / 1048576" | bc)
            echo "OK: AppImage found - $(basename "$inst") ($size_mb MB)"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platex-client-linux-build
          path: dist/installer/*.AppImage

      - name: Determine release tag
        id: release
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
            echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            git fetch --tags origin
            tags=$(git tag -l "v*")
            latest=""
            for tag in $tags; do
              if [[ $tag =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
                if [ -z "$latest" ]; then
                  latest="${BASH_REMATCH[1]}"
                else
                  if [ "$(printf '%s\n' "${BASH_REMATCH[1]}" "$latest" | sort -V | tail -n1)" = "${BASH_REMATCH[1]}" ]; then
                    latest="${BASH_REMATCH[1]}"
                  fi
                fi
              fi
            done
            if [ -z "$latest" ]; then
              next="1.0.0"
            else
              IFS='.' read -r major minor patch <<< "$latest"
              next="$major.$minor.$((patch + 1))"
            fi
            echo "tag_name=v$next" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.tag_name }}
          generate_release_notes: true
          files: dist/installer/*.AppImage
          prerelease: ${{ steps.release.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
