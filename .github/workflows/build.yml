name: Build PLatex

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pyinstaller

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --name platex-client --paths src launcher.py --clean

      - name: Prepare release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/PLatexClient-0.1.0/scripts | Out-Null
          Copy-Item dist/platex-client.exe release/PLatexClient-0.1.0/ -Force
          Copy-Item dist/platex_client-*.whl release/PLatexClient-0.1.0/ -Force
          Copy-Item dist/platex_client-*.tar.gz release/PLatexClient-0.1.0/ -Force
          Copy-Item README.md release/PLatexClient-0.1.0/ -Force
          Copy-Item config.example.yaml release/PLatexClient-0.1.0/ -Force
          Copy-Item scripts/glm_vision_ocr.py release/PLatexClient-0.1.0/scripts/ -Force
          Compress-Archive -Path release/PLatexClient-0.1.0/* -DestinationPath release/PLatexClient-0.1.0-win64.zip -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platex-client-windows-build
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/platex-client.exe
            release/PLatexClient-0.1.0-win64.zip
