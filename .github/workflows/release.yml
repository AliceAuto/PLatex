name: Release PLatex

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --onedir --name platex-client --paths src --add-data "scripts/glm_vision_ocr.py;scripts" --collect-submodules PyQt6 --collect-data PyQt6 --collect-binaries PyQt6 launcher.py

      - name: Verify bundled runtime files
        run: |
          if (!(Test-Path "dist/platex-client/platex-client.exe")) { throw "Missing dist/platex-client/platex-client.exe" }
          if (!(Test-Path "dist/platex-client/scripts/glm_vision_ocr.py")) { throw "Missing bundled script file" }

      - name: Build Inno Setup installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" platex-client.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          name: Auto Release ${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/installer/*.exe
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
