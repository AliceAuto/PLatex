name: Release PLatex

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[cleanup-now]')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --onedir --noconsole --contents-directory . --name platex-client --paths src --add-data "scripts/glm_vision_ocr.py;scripts" --collect-submodules PyQt6 --collect-data PyQt6 --collect-binaries PyQt6 launcher.py

      - name: Verify bundled runtime files
        run: |
          if (!(Test-Path "dist/platex-client/platex-client.exe")) { throw "Missing dist/platex-client/platex-client.exe" }
          $scriptPath = "dist/platex-client/scripts/glm_vision_ocr.py"
          if (!(Test-Path $scriptPath)) {
            $fallbackScriptPath = "dist/platex-client/_internal/scripts/glm_vision_ocr.py"
            if (!(Test-Path $fallbackScriptPath)) { throw "Missing bundled script file" }
          }

      - name: Build Inno Setup installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" platex-client.iss'

      - name: Compute next release tag
        id: next_tag
        shell: pwsh
        run: |
          git fetch --tags origin
          $tags = git tag -l "v*"
          $versions = @()
          foreach ($tag in $tags) {
            if ($tag -match '^v(\d+\.\d+\.\d+)$') {
              try {
                $versions += [version]$Matches[1]
              } catch {
              }
            }
          }
          if ($versions.Count -eq 0) {
            $next = [version]'1.0.0'
          } else {
            $current = $versions | Sort-Object -Descending | Select-Object -First 1
            $next = [version]::new($current.Major, $current.Minor, $current.Build + 1)
          }
          "tag_name=v$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_tag.outputs.tag_name }}
          name: ${{ steps.next_tag.outputs.tag_name }}
          generate_release_notes: true
          files: |
            dist/installer/*.exe
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
